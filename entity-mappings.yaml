# MoneyWorks Entity Documentation Mapping
# Maps each entity to its definitive documentation sources

entities:
  Name:
    description: "Customer, supplier, and contact management entity"
    primary_definition: "mirror/manual/moneyworks_appendix_names.html"
    related_docs:
      - "mirror/manual/names_overview.html"
      - "mirror/developer/api_names_endpoints.html"
    status: "complete"
    last_updated: "2025-01-15"
    coverage: 100
    key_semantic_fields:
      CustomerType:
        source_section: "CustomerType field definition"
        enum_values: 
          0: "not customer"
          1: "customer" 
          2: "debtor"
      SupplierType:
        source_section: "SupplierType field definition"
        enum_values:
          0: "not supplier"
          1: "supplier"
          2: "creditor"
      Kind:
        source_section: "Kind field definition"
        enum_values:
          0: "template"
          1: "normal"
      PaymentMethod:
        source_section: "PaymentMethod field definition"
        enum_values:
          0: "None"
          1: "Cash"
          2: "Cheque"
          3: "Electronic"
      ProductPricing:
        source_section: "ProductPricing field definition"
        enum_values: ["A", "B", "C", "D", "E", "F"]
      Flags:
        type: "bit_mapped"
        source_section: "Name Flags table"
        bit_flags:
          0x0001: "Requires order number"

  Account:
    description: "Chart of accounts and account management"
    primary_definition: "mirror/manual/moneyworks_appendix_accounts.html"
    related_docs:
      - "mirror/manual/chart_of_accounts.html"
      - "mirror/developer/api_accounts_endpoints.html"
    status: "pending"
    coverage: 0
    key_semantic_fields:
      Type:
        source_section: "Type field definition"
        enum_values:
          "I": "Income"
          "S": "Sale of Assets"
          "E": "Expense"
          "C": "Cost of Sales"
          "A": "Asset"
          "L": "Liability"
          "F": "Equity"
          "T": "Tax Control"
          "M": "Memorandum"
          "H": "Header"
      System:
        source_section: "System field definition"
        enum_values:
          "P": "Profit & Loss"
          "R": "Retained Earnings"
          "K": "Bank Account"
          "A": "Accounts Receivable"
          "L": "Accounts Payable"
          "F": "Fixed Assets"
          " ": "Standard"

  Transaction:
    description: "Main transaction table for all financial transactions"
    primary_definition: "mirror/manual/moneyworks_appendix_transactions.html"
    related_docs:
      - "mirror/manual/transaction_types.html"
      - "mirror/developer/api_transactions_endpoints.html"
    status: "pending"
    coverage: 0
    key_semantic_fields:
      Type:
        source_section: "Transaction Type field definition"
        type: "complex_enum"
        # Will need to extract from docs
      Status:
        source_section: "Status field definition"
        type: "enum"

  Product:
    description: "Inventory and product management"
    primary_definition: "mirror/manual/moneyworks_appendix_products.html"
    related_docs:
      - "mirror/manual/inventory_management.html"
      - "mirror/developer/api_products_endpoints.html"
    status: "pending"
    coverage: 0

  Terms:
    description: "Payment terms definitions"
    primary_definition: "mirror/manual/moneyworks_appendix_terms.html"
    status: "pending"
    coverage: 0

# Generation settings
generation:
  output_dir: "generated/"
  templates:
    interface: true
    enums: true
    validators: true
    query_builders: true
    type_guards: true
  validation:
    field_length_checks: true
    enum_validation: true
    required_field_checks: true

# Documentation sources to mirror
mirror_sources:
  manual:
    base_url: "https://cognito.co.nz/manual/"
    output_dir: "mirror/manual/"
    pages:
      - "moneyworks_appendix_names.html"
      - "moneyworks_appendix_accounts.html"
      - "moneyworks_appendix_transactions.html"
      - "moneyworks_appendix_products.html"
      - "moneyworks_appendix_terms.html"
      # Add more as needed
  developer:
    base_url: "https://cognito.co.nz/developer/"
    output_dir: "mirror/developer/"
    pages:
      - "api_names_endpoints.html"
      - "api_accounts_endpoints.html"
      - "api_transactions_endpoints.html"
      # Add more as needed 