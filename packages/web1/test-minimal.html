<!DOCTYPE html>
<html>
<head>
  <title>Web1 Test</title>
  <script>
    // Test if we can reach the API
    fetch('http://localhost:3000/api/v1/health')
      .then(res => res.json())
      .then(data => {
        document.getElementById('api-status').textContent = 'API Status: Connected ✅';
        document.getElementById('api-data').textContent = JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('api-status').textContent = 'API Status: Failed ❌';
        document.getElementById('api-error').textContent = err.toString();
      });
  </script>
</head>
<body>
  <h1>Web1 Installation Test</h1>
  <p id="api-status">API Status: Checking...</p>
  <pre id="api-data"></pre>
  <pre id="api-error"></pre>
</body>
</html>
