<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyWorks Web1 - Dev Server Running</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect } = React;
    const API_BASE = 'http://localhost:3000/api/v1';
    
    function App() {
      const [apiStatus, setApiStatus] = useState('checking...');
      const [taxRates, setTaxRates] = useState([]);
      
      useEffect(() => {
        fetch(API_BASE + '/health')
          .then(res => res.json())
          .then(() => {
            setApiStatus('✅ Connected');
            return fetch(API_BASE + '/tables/TaxRate');
          })
          .then(res => res.json())
          .then(data => {
            setTaxRates(data.data || []);
          })
          .catch(() => setApiStatus('❌ Failed'));
      }, []);
      
      return React.createElement('div', { style: { padding: '20px', fontFamily: 'system-ui' } },
        React.createElement('h1', null, 'MoneyWorks Web1 - Dev Server Running!'),
        React.createElement('p', null, 'Vite dev server is running on port 3001'),
        React.createElement('p', null, 'API Status: ', apiStatus),
        React.createElement('h2', null, 'Tax Rates'),
        React.createElement('table', { style: { borderCollapse: 'collapse', width: '100%' } },
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', { style: { border: '1px solid #ddd', padding: '8px' } }, 'Code'),
              React.createElement('th', { style: { border: '1px solid #ddd', padding: '8px' } }, 'Description'),
              React.createElement('th', { style: { border: '1px solid #ddd', padding: '8px' } }, 'Rate')
            )
          ),
          React.createElement('tbody', null,
            taxRates.map(rate =>
              React.createElement('tr', { key: rate.TaxCode },
                React.createElement('td', { style: { border: '1px solid #ddd', padding: '8px' } }, rate.TaxCode),
                React.createElement('td', { style: { border: '1px solid #ddd', padding: '8px' } }, rate.Ratename),
                React.createElement('td', { style: { border: '1px solid #ddd', padding: '8px' } }, rate.Rate1 + '%')
              )
            )
          )
        )
      );
    }
    
    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
</body>
</html>
