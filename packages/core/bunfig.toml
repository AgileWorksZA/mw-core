[test]
# Preload setup file before running tests
preload = ["./src/test-utils/setup.ts"]

# Set coverage options
coverage = true
coverageThreshold = { line = 0.9, function = 0.8, branch = 0.8, statement = 0.9 }

# Test timeout
timeout = 30000

# Bail on first test failure for faster feedback
bail = false