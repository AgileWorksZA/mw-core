# ============================================================================
# QUALITY ASSURANCE PROTOCOL
# ============================================================================

qa_protocol:
  principle: "Agents are stochastic - all work must be verified"

  extraction_verification:
    method: "Second agent reads same source, compares extraction"
    acceptance: "95%+ field agreement"
    conflict_resolution: "Source document takes precedence"

  integration_verification:
    method: "Third agent validates integrated output against both source and extraction"
    acceptance: "Zero contradictions"

  semantic_verification:
    method: "Domain expert agent reviews teleology and axiology claims"
    acceptance: "Claims must be defensible from source material"

