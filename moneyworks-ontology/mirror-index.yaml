# ============================================================================
# MINING PRIORITIES
# ============================================================================

mining_priorities:
  P1_critical:
    description: "Core entities requiring immediate verification"
    entities:
      - Transactions
      - Accounts
      - Names
      - Products
      - Jobs
    rationale: "Highest FK density, most qualia gaps"

  P2_high:
    description: "Important supporting entities"
    entities:
      - Assets
      - TaxRates
      - Departments
      - Contacts
      - Inventory
      - Payments
      - Allocations
    rationale: "FK verification needed, moderate qualia gaps"

  P3_standard:
    description: "System and supporting entities"
    entities:
      - Reconciliation
      - BuildRecords
      - Memo
      - Login
      - User
      - User2
      - General
    rationale: "Lower impact, simpler structures"

# ============================================================================
# SUBAGENT MINING ASSIGNMENTS
# ============================================================================

mining_assignments:
  batch_1:
    agents: 5
    focus: "P1 entities - appendix field extraction"
    assignments:
      agent_1: { entity: Transactions, file: "moneyworks_appendix_transactions.html" }
      agent_2: { entity: Accounts, file: "moneyworks_appendix_accounts.html" }
      agent_3: { entity: Names, file: "moneyworks_appendix_names.html" }
      agent_4: { entity: Products, file: "moneyworks_appendix_products.html" }
      agent_5: { entity: Jobs, file: "moneyworks_appendix_jobs.html" }

  batch_2:
    agents: 5
    focus: "P2 entities - appendix field extraction"
    assignments:
      agent_1: { entity: Assets, file: "moneyworks_appendix_assets.html" }
      agent_2: { entity: TaxRates, file: "moneyworks_appendix_tax_rate.html" }
      agent_3: { entity: Departments, file: "moneyworks_appendix_departments.html" }
      agent_4: { entity: Contacts, file: "moneyworks_appendix_contacts.html" }
      agent_5: { entity: Inventory, file: "moneyworks_appendix_inventory.html" }

  batch_3:
    agents: 5
    focus: "P2/P3 entities - appendix field extraction"
    assignments:
      agent_1: { entity: Payments, file: "moneyworks_appendix_payments_file.html" }
      agent_2: { entity: Allocations, file: "moneyworks_appendix_allocation_file.html" }
      agent_3: { entity: Reconciliation, file: "moneyworks_appendix_reconciliation_file.html" }
      agent_4: { entity: BuildRecords, file: "moneyworks_appendix_build_file.html" }
      agent_5: { entity: Memo, file: "moneyworks_appendix_memo_file.html" }

  batch_4:
    agents: 3
    focus: "System entities - appendix field extraction"
    assignments:
      agent_1: { entity: Login, file: "moneyworks_appendix_login_file.html" }
      agent_2: { entity: User, file: "moneyworks_appendix_user_file.html" }
      agent_3: { entity: User2, file: "moneyworks_appendix_user2_file.html" }

  batch_5_process:
    agents: 5
    focus: "Business process documentation for qualia enrichment"
    assignments:
      agent_1: { topic: "payment_allocation", sources: ["cash", "debtors", "creditors"] }
      agent_2: { topic: "tax_calculation", sources: ["gst"] }
