  session_007_semantic_theme: "Verification rigor vs assumption trap"

  key_insight: |
    Session 007 demonstrated both strengths and risks:
    - Strength: Systematic manual search + API schema verification
    - Risk: Made conclusions without checking actual export data
    - Learning: Multiple sources of truth exist (manual, API, exports)
    - Principle: Always verify against most authoritative source (actual data)

  epistemic_lesson: |
    "Slot field exclusion" seemed reasonable based on it being undocumented,
    but this was an ASSUMPTION. The field exists in empirical data and should
    be verified against exports before excluding from business ontology.

    "AverageValue deprecated" conclusion was premature - found in export/import
    docs but NOT verified in actual export files. This is a potential hallucination
    that could have propagated into ontology if not caught.

  methodological_improvement: |
    Three-source verification protocol established:
    1. Manual appendices (authoritative for semantics)
    2. API schema (authoritative for REST API fields)
    3. Export data (authoritative for actual database fields)

    All three must align before making ontology changes.

  architecture_pattern_discovered: |
    Subfile naming convention fully understood:
    - Detail.FieldName (API prefix)
    - Build.FieldName (API prefix)
    - Memo.FieldName (API prefix)

    These three entities use prefixed field names in API responses but bare
    names in ontology definitions. Verification script now handles all three.

