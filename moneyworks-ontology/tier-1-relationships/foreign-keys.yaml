# MoneyWorks Complete Foreign Key Registry
# Tier 1: Navigation - loaded for exploration
# Token budget: ~2000 tokens
#
# VALIDATION STATUS: Reconciled 2025-01-25
# - Verified fields marked with [V]
# - Semantic inference marked with [S] (logically correct but no relationshipTarget in source)
# - Field name corrections applied per validation report

foreign_keys:
  # === TRANSACTIONS ===

  Transactions:
    NameCode:  # [V] Verified in source
      target: Names.Code
      cardinality: N:1
      nullable: true
      semantic: "The customer or supplier for this transaction"
      validation: "If TypeCode is debtor type, Name must have CustomerType > 0"
      source_verified: true

    Contra:  # [V] Verified in source
      target: Accounts.Code
      cardinality: N:1
      nullable: true
      semantic: "Bank/cash account for receipts/payments"
      source_verified: true

    OriginalSeq:  # [S] Semantic - field exists, logical FK
      target: Transaction.SequenceNumber
      cardinality: N:1
      nullable: true
      semantic: "Original transaction (for cancellations)"
      self_referential: true
      source_verified: false
      note: "Field exists but no relationshipTarget in source"

    OrderSeq:  # [S] Semantic - field exists, logical FK
      target: Transaction.SequenceNumber
      cardinality: N:1
      nullable: true
      semantic: "Original order (for fulfilled orders)"
      self_referential: true
      source_verified: false

