      constraint: "Account must have System='AR'"
      source_verified: false

    PayAccount:  # [S] Field exists, logical FK to AP control account
      target: Accounts.Code
      cardinality: N:1
      nullable: true
      semantic: "Accounts Payable control account for this creditor"
      constraint: "Account must have System='AP'"
