    StockCode:  # [V] Verified in source
      target: Products.Code
      cardinality: N:1
      nullable: true
      semantic: "Product code (for inventory transactions)"
      source_verified: true

    JobCode:  # [V] Verified in source
      target: Jobs.Code
      cardinality: N:1
      nullable: true
      semantic: "Job code for cost tracking"
      source_verified: true

    TaxCode:  # [V] Verified - target is TaxRates.TaxCode not .Code
      target: TaxRates.TaxCode
      cardinality: N:1
      nullable: true
      semantic: "Tax code for this line"
      source_verified: true

    Dept:  # [S] Semantic inference
      target: Departments.Code
      cardinality: N:1
      nullable: true
      semantic: "Department for classification"
